<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Einloggen · KI Marketing Bootcamp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<nav class="topnav">
  <a href="./" class="topnav-logo">
    <div class="topnav-logo-dot"></div>
    <span>KI Marketing Bootcamp</span>
  </a>
  <div class="topnav-spacer"></div>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <h1>Einloggen</h1>
    <p>Gib deine E-Mail ein — wir schicken dir einen Login-Link.</p>

    <!-- Step 1: email form -->
    <form id="login-form" novalidate>
      <div class="login-field">
        <label for="email">E-Mail</label>
        <input type="email" id="email" placeholder="deine@email.de" autocomplete="email" required>
      </div>
      <div class="login-error" id="login-error"></div>
      <button type="submit" class="login-submit" id="login-btn">Magic Link senden</button>
    </form>

    <!-- Step 2: confirmation (hidden until link is sent) -->
    <div id="login-sent" style="display:none; text-align:center; padding: 8px 0;">
      <div style="font-size:32px; margin-bottom:12px;">📬</div>
      <p style="font-weight:600; margin-bottom:6px;">Schau in dein Postfach!</p>
      <p style="color:var(--text-muted); font-size:13px;">Wir haben dir einen Login-Link geschickt. Klick darauf, um dich anzumelden.</p>
    </div>

    <div class="login-footer">
      Noch kein Zugang? <a href="https://buy.stripe.com/4gM9AU1De9Cu6sS6irak000">Jetzt für €99 kaufen →</a>
    </div>
  </div>
</div>

<script>
(function () {
  var SUPABASE_URL     = 'https://awayfgpspoewjkwavvan.supabase.co';
  var SUPABASE_KEY     = 'sb_publishable_zn0xfUDgSQ65cZ7Nw540yw_F9trUA_T';
  var DEFAULT_REDIRECT = './';
  var STORAGE_KEY      = 'auth_redirect';

  var client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function getRedirectTarget() {
    // Prefer the ?redirect= param from the current URL, fall back to stored value
    var params = new URLSearchParams(window.location.search);
    var target = params.get('redirect') || localStorage.getItem(STORAGE_KEY) || DEFAULT_REDIRECT;
    localStorage.removeItem(STORAGE_KEY);
    // Only allow same-origin redirects
    try {
      var url = new URL(target);
      if (url.origin === window.location.origin) return target;
    } catch (e) { /* ignore */ }
    return DEFAULT_REDIRECT;
  }

  function redirectAfterLogin() {
    window.location.href = getRedirectTarget();
  }

  function checkSessionAndRedirect(session) {
    if (!session) return;
    client
      .from('purchases')
      .select('user_id')
      .eq('user_id', session.user.id)
      .maybeSingle()
      .then(function (result) {
        if (result.data) redirectAfterLogin();
        // No purchase row: stay on login page (rare — magic link was sent to a non-customer)
      });
  }

  // Handle magic link return: Supabase JS automatically exchanges the token
  // in the URL hash/query and fires SIGNED_IN via onAuthStateChange.
  client.auth.onAuthStateChange(function (event, session) {
    if (event === 'SIGNED_IN') {
      checkSessionAndRedirect(session);
    }
  });

  // Also check for an existing session on page load (e.g. already logged in)
  client.auth.getSession().then(function (res) {
    checkSessionAndRedirect(res.data && res.data.session);
  });

  var form    = document.getElementById('login-form');
  var btn     = document.getElementById('login-btn');
  var errorEl = document.getElementById('login-error');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.style.display = 'block';
  }

  function clearError() {
    errorEl.textContent = '';
    errorEl.style.display = 'none';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    clearError();

    var email = document.getElementById('email').value.trim();
    if (!email) {
      showError('Bitte gib deine E-Mail-Adresse ein.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Wird gesendet…';

    // Store the redirect target now so it survives the email-link round-trip
    var params = new URLSearchParams(window.location.search);
    var target = params.get('redirect');
    if (target) localStorage.setItem(STORAGE_KEY, target);

    client.auth.signInWithOtp({
      email: email,
      options: {
        // After clicking the magic link, Supabase redirects here so the
        // client can exchange the token and fire onAuthStateChange.
        emailRedirectTo: window.location.origin + '/kurs/login.html'
      }
    }).then(function (res) {
      if (res.error) {
        showError('Fehler: ' + res.error.message);
        btn.disabled    = false;
        btn.textContent = 'Magic Link senden';
        return;
      }
      // Show confirmation, hide form
      form.style.display = 'none';
      document.getElementById('login-sent').style.display = 'block';
    }).catch(function () {
      showError('Ein unerwarteter Fehler ist aufgetreten. Bitte versuche es erneut.');
      btn.disabled    = false;
      btn.textContent = 'Magic Link senden';
    });
  });
}());
</script>
</body>
</html>
