<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* ─── COURSE HERO ─── */
.course-hero {
  background: #0E0D0C;
  color: white;
  border-radius: var(--radius-lg);
  padding: 52px 48px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
  border: 1px solid #2A2520;
  box-shadow: 0 12px 40px rgba(0,0,0,0.22);
}
.course-hero::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 85% 30%, rgba(26,111,255,0.14) 0%, transparent 55%),
    radial-gradient(ellipse at 15% 80%, rgba(0,194,168,0.10) 0%, transparent 50%);
  pointer-events: none;
}
.course-tag {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
  color: #80AAFF; background: rgba(128,170,255,0.12);
  border: 1px solid rgba(128,170,255,0.22);
  padding: 4px 12px; border-radius: 999px; margin-bottom: 22px;
  font-family: 'JetBrains Mono', monospace;
}
.course-hero h1 {
  font-size: clamp(26px, 3.5vw, 42px);
  font-weight: 700; letter-spacing: -0.025em;
  margin-bottom: 14px; line-height: 1.1;
}
.course-hero p {
  color: rgba(255,255,255,0.48); font-size: 15px;
  max-width: 540px; font-weight: 300; line-height: 1.7;
}
.course-hero-meta {
  display: flex; gap: 28px; margin-top: 36px; flex-wrap: wrap;
  padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.07);
}
.course-hero-meta-item {
  display: flex; align-items: center; gap: 7px;
  font-size: 12px; color: rgba(255,255,255,0.38);
  font-family: 'JetBrains Mono', monospace;
}
.course-hero-meta-item span { color: rgba(255,255,255,0.72); font-weight: 500; }

/* ─── BENTO GRID ─── */
.bento-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
}
.topic-card.featured {
  grid-column: span 2;
  background: linear-gradient(135deg, #0A0C1A 0%, #0E0D0C 60%);
  border-color: rgba(26,111,255,0.30);
  color: white;
  padding: 32px;
  min-height: 240px;
  position: relative;
  overflow: hidden;
}
.topic-card.featured::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 85% 30%, rgba(26,111,255,0.20) 0%, transparent 60%);
  pointer-events: none;
}
.topic-card.featured:hover {
  border-color: rgba(26,111,255,0.55);
  box-shadow: 0 12px 36px rgba(26,111,255,0.25), 0 2px 8px rgba(26,111,255,0.10);
  transform: translateY(-2px);
}
.topic-card.featured .topic-card-num { color: rgba(128,170,255,0.5); }
.topic-card.featured .topic-card-icon { font-size: 40px; }
.topic-card.featured .topic-card-label { color: #80AAFF; }
.topic-card.featured .topic-card-title { font-size: 22px; color: white; }
.topic-card.featured .topic-card-desc { color: rgba(255,255,255,0.55); font-size: 14px; }
.topic-card.featured .topic-card-badge {
  background: rgba(128,170,255,0.15);
  color: #B8D1FF;
  border: 1px solid rgba(128,170,255,0.25);
}
.featured-cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 20px; padding: 10px 18px; border-radius: 999px;
  background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9);
  border: 1px solid rgba(255,255,255,0.15);
  font-size: 13px; font-weight: 500;
  transition: all 0.2s; align-self: flex-start;
  text-decoration: none;
}
.topic-card.featured:hover .featured-cta {
  background: rgba(255,255,255,0.16);
  border-color: rgba(255,255,255,0.25);
}
.topic-card-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500; letter-spacing: 0.06em;
  color: var(--text-subtle); margin-bottom: 4px;
}
.topic-card:hover .topic-card-num { color: var(--accent); }
.topic-card.featured .topic-card-num { margin-bottom: 12px; }
@media(max-width: 760px) {
  .bento-grid { grid-template-columns: 1fr 1fr; }
  .topic-card.featured { grid-column: span 2; min-height: 200px; padding: 24px; }
  .course-hero { padding: 32px 24px; }
}
@media(max-width: 480px) {
  .bento-grid { grid-template-columns: 1fr; }
  .topic-card.featured { grid-column: span 1; }
}
</style>
<script src="data/course.js"></script>
<script src="js/course-home.js"></script>
</head>
<body></body>
</html>
